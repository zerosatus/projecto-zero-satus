<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário - Painel do Aluno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>Painel do Aluno</span>
            </div>
            
            <nav class="menu">
                <a href="../inicio/index.html" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Início</span>
                </a>
                <a href="../dashboard/index.html" class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="./index.html" class="menu-item active">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Calendário</span>
                </a>
                <a href="../tarefas/index.html" class="menu-item">
                    <i class="fas fa-tasks"></i>
                    <span>Tarefas</span>
                </a>
                <a href="../anotacoes/index.html" class="menu-item">
                    <i class="fas fa-sticky-note"></i>
                    <span>Anotações</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Comunidade</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-question-circle"></i>
                    <span>Ajuda</span>
                </a>
            </nav>
            
            <div class="menu-bottom">
                <div class="logout-section">
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Sair</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <h1>Bem-vindo, <span id="userNameDisplay">Aluno</span>!</h1>
                <div class="header-actions">
                    <button class="icon-btn">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notificationBadge" style="display: none;">0</span>
                    </button>
                    <div class="user-profile">
                        <img id="userAvatar" src="https://ui-avatars.com/api/?name=U&background=9333ea&color=fff&size=32" alt="Avatar">
                        <span id="userName">Aluno</span>
                    </div>
                </div>
            </header>

            <!-- Calendar Container -->
            <div class="calendar-container">
                <div class="calendar-header">
                    <div class="month-nav">
                        <h2 id="currentMonth">Carregando...</h2>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <button class="nav-btn" id="nextBtn">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    <div class="view-actions">
                        <div class="view-toggle">
                            <button class="toggle-btn active" data-view="month">Mês</button>
                            <button class="toggle-btn" data-view="week">Semana</button>
                            <button class="toggle-btn" data-view="day">Dia</button>
                        </div>
                        <button class="btn-primary" id="newEventBtn">
                            <i class="fas fa-plus"></i> Novo Evento
                        </button>
                    </div>
                </div>

                <div class="calendar-grid">
                    <div class="weekdays" id="weekdaysHeader">
                        <div>Dom</div>
                        <div>Seg</div>
                        <div>Ter</div>
                        <div>Qua</div>
                        <div>Qui</div>
                        <div>Sex</div>
                        <div>Sáb</div>
                    </div>
                    <div class="days" id="calendarDays"></div>
                </div>
            </div>

            <!-- Events Section -->
            <div class="events-section">
                <h3>Eventos do Dia <span id="selectedDay">--</span></h3>
                <div class="events-list" id="eventsList">
                    <p style="color: var(--text-secondary); padding: 1rem; text-align: center;">Selecione um dia para ver os eventos</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Novo Evento -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Criar Novo Evento</h2>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="eventForm">
                <div class="form-group">
                    <label>Título do Evento *</label>
                    <input type="text" id="eventTitle" placeholder="Ex: Prova de Matemática" required>
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="eventDescription" placeholder="Detalhes do evento (opcional)"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label>Início</label>
                        <input type="time" id="eventStart" required>
                    </div>
                    <div class="form-group">
                        <label>Término</label>
                        <input type="time" id="eventEnd" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tipo de Evento</label>
                    <div class="event-type-grid">
                        <button type="button" class="type-btn active" data-type="aula">
                            <i class="fas fa-book"></i> Aula
                        </button>
                        <button type="button" class="type-btn" data-type="prova">
                            <i class="fas fa-file-alt"></i> Prova
                        </button>
                        <button type="button" class="type-btn" data-type="trabalho">
                            <i class="fas fa-briefcase"></i> Trabalho
                        </button>
                        <button type="button" class="type-btn" data-type="apresentacao">
                            <i class="fas fa-chalkboard-teacher"></i> Apresentação
                        </button>
                        <button type="button" class="type-btn" data-type="reuniao">
                            <i class="fas fa-users"></i> Reunião
                        </button>
                        <button type="button" class="type-btn" data-type="outro">
                            <i class="fas fa-circle"></i> Outro
                        </button>
                    </div>
                    <input type="hidden" id="eventType" value="aula">
                </div>

                <div class="form-group">
                    <label>Repetir</label>
                    <select id="eventRepeat">
                        <option value="nao">Não repetir</option>
                        <option value="diario">Diariamente</option>
                        <option value="semanal">Semanalmente</option>
                        <option value="mensal">Mensalmente</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="eventReminder">
                        <label for="eventReminder">Ativar lembrete para este evento</label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="btnCancel">Cancelar</button>
                    <button type="submit" class="btn-create">Criar Evento</button>
                </div>
            </form>
        </div>
    </div>

  <!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SERVIÇOS (ORDEM IMPORTANTE!) -->
<script src="../mobile-telas/supabase-client.js"></script>     <!-- AuthService primeiro -->
<script src="../mobile-telas/database-service.js"></script>    <!-- DatabaseService -->
<script src="../mobile-telas/realtime-sync.js"></script>       <!-- Realtime -->
<script src="../mobile-telas/cache-manager.js"></script>       <!-- Cache -->
<script src="../mobile-telas/shared-data.js"></script>         <!-- Shared -->
<script src="../mobile-telas/sync-helper.js"></script>         <!-- Sync -->

<!-- FUNCIONALIDADES -->
<script src="../mobile-telas/daily-phrases.js"></script>
<script src="../mobile-telas/notes-sync.js"></script>

<!-- PÁGINA -->
<script src="script.js"></script>
</body>
</html>
