<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno Mobile</title>
    <!-- Ícones -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-container">
        <header>
            <div class="greeting">
                <h1>Jose</h1>
                <p>Bem-vindo de volta 👋</p>
            </div>
            <div class="profile-icon">
                <ion-icon name="notifications-outline"></ion-icon>
                <span class="notification-badge">8</span>
            </div>
        </header>

        <section class="summary-cards">
            <div class="card">
                <div class="card-icon tarefas"><ion-icon name="book-outline"></ion-icon></div>
                <span class="card-number">12</span>
                <span class="card-label">Disciplinas</span>
            </div>
            <div class="card">
                <div class="card-icon concluidas"><ion-icon name="checkmark-circle-outline"></ion-icon></div>
                <span class="card-number">8</span>
                <span class="card-label">Concluídas</span>
            </div>
            <div class="card">
                <div class="card-icon pendentes"><ion-icon name="time-outline"></ion-icon></div>
                <span class="card-number">5</span>
                <span class="card-label">Pendentes</span>
            </div>
        </section>

        <section class="schedule-section">
            <div class="section-header">
                <h2 class="section-title">Horário Semanal</h2>
                <span class="edit-btn" id="toggle-edit-mode">
                    <ion-icon name="create-outline"></ion-icon> Editar
                </span>
            </div>
            
            <!-- WRAPPER PARA SCROLL HORIZONTAL (ESSENCIAL) -->
            <div class="schedule-wrapper">
                <div id="schedule-grid" class="schedule-grid"></div>
            </div>
        </section>

        <section class="next-classes-section">
            <div class="section-header">
                <h2 class="section-title">Próximas Aulas</h2>
                <span class="edit-btn">Ver todas</span>
            </div>
            <div id="classes-list"></div>
        </section>

        <section class="notifications-section">
            <div class="section-header">
                <h2 class="section-title">Notificações</h2>
                <span class="edit-btn">Ver todas</span>
            </div>
            <div id="notifications-list"></div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-item active">
                <ion-icon name="home"></ion-icon>
                <span>Início</span>
            </div>
            <div class="nav-item">
                <ion-icon name="calendar-outline"></ion-icon>
                <span>Calendário</span>
            </div>
            <div class="nav-item">
                <ion-icon name="checkbox-outline"></ion-icon>
                <span>Tarefas</span>
            </div>
            <div class="nav-item">
                <ion-icon name="document-text-outline"></ion-icon>
                <span>Notas</span>
            </div>
            <div class="nav-item">
                <ion-icon name="person-outline"></ion-icon>
                <span>Perfil</span>
            </div>
        </nav>

        <!-- MODAL DE EDIÇÃO -->
        <div id="edit-modal" class="edit-modal">
            <div class="edit-modal-content">
                <div class="edit-modal-header">
                    <button class="btn-back" id="btn-back">
                        <ion-icon name="arrow-back-outline"></ion-icon>
                    </button>
                    <h2>Editar Horário Semanal</h2>
                    <button class="btn-save" id="btn-save">Salvar</button>
                </div>
                
                <!-- WRAPPER DO MODAL TAMBÉM -->
                <div class="edit-schedule-wrapper">
                    <div id="edit-schedule-grid" class="edit-schedule-grid"></div>
                </div>
                
                <div class="add-time-section">
                    <h3>Novo horário (ex: 11:00)</h3>
                    <div class="add-time-controls">
                        <input type="time" id="new-time-input" value="11:00">
                        <button class="btn-add-time" id="btn-add-time">Adicionar</button>
                        <button class="btn-cancel-time" id="btn-cancel-time">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
