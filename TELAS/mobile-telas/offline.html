<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Painel do Aluno</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent-purple: #8b5cf6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 375px;
            padding: 40px 20px;
        }
        
        .offline-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--card-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            border: 2px solid var(--accent-purple);
        }
        
        .offline-icon ion-icon {
            font-size: 3rem;
            color: var(--accent-purple);
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        
        .retry-btn:hover {
            transform: scale(1.05);
        }
        
        .features-list {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #2d3748;
        }
        
        .features-list h3 {
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #2d3748;
        }
        
        .feature-item:last-child {
            border-bottom: none;
        }
        
        .feature-item ion-icon {
            color: var(--accent-purple);
            font-size: 1.2rem;
        }
        
        .feature-item span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <ion-icon name="cloud-offline-outline"></ion-icon>
        </div>
        
        <h1>Você está offline</h1>
        <p>Não se preocupe! Você ainda pode acessar seus dados salvos e continuar estudando.</p>
        
        <button class="retry-btn" onclick="window.location.reload()">
            Tentar Reconectar
        </button>
        
        <div class="features-list">
            <h3>Funcionalidades disponíveis offline:</h3>
            
            <div class="feature-item">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
                <span>Horário semanal salvo</span>
            </div>
            
            <div class="feature-item">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
                <span>Tarefas pendentes e concluídas</span>
            </div>
            
            <div class="feature-item">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
                <span>Anotações e resumos</span>
            </div>
            
            <div class="feature-item">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
                <span>Calendário com eventos salvos</span>
            </div>
            
            <div class="feature-item">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
                <span>Perfil e configurações</span>
            </div>
        </div>
    </div>
</body>
</html>
