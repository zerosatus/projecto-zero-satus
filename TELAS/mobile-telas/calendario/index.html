<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário - Painel do Aluno</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="mobile-container">
        <header>
            <div class="greeting">
                <h1 id="header-name">Usuário</h1>
                <p>Calendário Acadêmico</p>
            </div>
            <div class="profile-icon" id="notification-bell">
                <ion-icon name="notifications-outline"></ion-icon>
                <span class="notification-badge" id="notification-badge">3</span>
            </div>
        </header>

        <div id="calendar-view">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month"><ion-icon name="chevron-back-outline"></ion-icon></button>
                    <h2 id="current-month-year">Março de 2026</h2>
                    <button id="next-month"><ion-icon name="chevron-forward-outline"></ion-icon></button>
                </div>
                <div class="calendar-grid">
                    <div class="weekday">D</div>
                    <div class="weekday">S</div>
                    <div class="weekday">T</div>
                    <div class="weekday">Q</div>
                    <div class="weekday">Q</div>
                    <div class="weekday">S</div>
                    <div class="weekday">S</div>
                </div>
                <div class="calendar-grid" id="calendar-days"></div>
            </div>

            <div class="events-section">
                <div class="section-header">
                    <h3 class="section-title" id="events-date">Eventos do dia</h3>
                    <button class="btn-add-task" id="btn-new-event">
                        <ion-icon name="add-outline"></ion-icon>
                    </button>
                </div>
                <div id="events-list"></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" data-view="home">
                <ion-icon name="home-outline"></ion-icon>
                <span>Início</span>
            </div>
            <div class="nav-item active" data-view="calendar">
                <ion-icon name="calendar-outline"></ion-icon>
                <span>Calendário</span>
            </div>
            <div class="nav-item" data-view="tasks">
                <ion-icon name="checkbox-outline"></ion-icon>
                <span>Tarefas</span>
            </div>
            <div class="nav-item" data-view="notes">
                <ion-icon name="document-text-outline"></ion-icon>
                <span>Notas</span>
            </div>
            <div class="nav-item" data-view="profile">
                <ion-icon name="person-outline"></ion-icon>
                <span>Perfil</span>
            </div>
        </nav>
    </div>

    <div class="event-modal" id="event-modal">
        <div class="event-modal-content">
            <div class="event-modal-header">
                <button class="btn-back" data-modal="event-modal">
                    <ion-icon name="arrow-back-outline"></ion-icon>
                </button>
                <h2 id="event-modal-title">Gerenciar Eventos</h2>
                <button class="btn-close" data-modal="event-modal">
                    <ion-icon name="close-outline"></ion-icon>
                </button>
            </div>
            <form class="event-form">
                <div class="input-group">
                    <label>Título</label>
                    <input type="text" id="event-title" placeholder="Nome do evento">
                </div>
                <div class="input-group">
                    <label>Data</label>
                    <input type="date" id="event-date">
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Início</label>
                        <input type="time" id="event-start">
                    </div>
                    <div class="input-group">
                        <label>Fim</label>
                        <input type="time" id="event-end">
                    </div>
                </div>
                <div class="input-group">
                    <label>Tipo de Evento</label>
                    <div class="event-types">
                        <div class="type-btn active" data-type="aula">
                            <ion-icon name="book-outline"></ion-icon>
                            <span>Aula</span>
                        </div>
                        <div class="type-btn" data-type="prova">
                            <ion-icon name="document-outline"></ion-icon>
                            <span>Prova</span>
                        </div>
                        <div class="type-btn" data-type="tarefa">
                            <ion-icon name="checkbox-outline"></ion-icon>
                            <span>Tarefa</span>
                        </div>
                        <div class="type-btn" data-type="outro">
                            <ion-icon name="calendar-outline"></ion-icon>
                            <span>Outro</span>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Cor</label>
                    <div class="color-options">
                        <div class="color-option" data-color="#6366f1">
                            <div class="color-circle" style="background-color: #6366f1;"></div>
                        </div>
                        <div class="color-option" data-color="#ec4899">
                            <div class="color-circle" style="background-color: #ec4899;"></div>
                        </div>
                        <div class="color-option" data-color="#ef4444">
                            <div class="color-circle" style="background-color: #ef4444;"></div>
                        </div>
                        <div class="color-option" data-color="#10b981">
                            <div class="color-circle" style="background-color: #10b981;"></div>
                        </div>
                        <div class="color-option" data-color="#f59e0b">
                            <div class="color-circle" style="background-color: #f59e0b;"></div>
                        </div>
                        <div class="color-option" data-color="#8b5cf6">
                            <div class="color-circle" style="background-color: #8b5cf6;"></div>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn-save" id="btn-save-event">Salvar</button>
            </form>
        </div>
    </div>

    <div class="notifications-modal" id="notifications-modal">
        <div class="notifications-modal-content">
            <div class="notifications-modal-header">
                <h2>Notificações</h2>
                <div class="notifications-actions">
                    <button class="btn-mark-read" id="btn-mark-read">
                        <ion-icon name="checkmark-done-outline"></ion-icon> Marcar todas
                    </button>
                    <button class="btn-clear-all" id="btn-clear-all">
                        <ion-icon name="trash-outline"></ion-icon>
                    </button>
                </div>
            </div>
            <div class="notifications-tabs">
                <div class="notification-tab active" data-type="all">Todas</div>
                <div class="notification-tab" data-type="unread">Não Lidas</div>
                <div class="notification-tab" data-type="aulas">Aulas</div>
                <div class="notification-tab" data-type="tarefas">Tarefas</div>
            </div>
            <div id="notifications-list-modal"></div>
            <button class="btn-close-modal" id="btn-close-notifications">Fechar</button>
        </div>
    </div>

    <div class="confirm-modal" id="confirm-modal">
        <div class="confirm-modal-content">
            <div class="confirm-icon">
                <ion-icon name="warning-outline"></ion-icon>
            </div>
            <h3 id="confirm-title">Confirmar ação</h3>
            <p id="confirm-message">Tem certeza que deseja continuar?</p>
            <div class="confirm-buttons">
                <button class="btn-cancel" id="confirm-cancel">Cancelar</button>
                <button class="btn-ok" id="confirm-ok">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../cache-manager.js"></script>
    <script src="../shared-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
