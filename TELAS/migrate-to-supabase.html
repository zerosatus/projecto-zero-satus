<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migração de Dados - Painel Zero</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mesmo estilo do original */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px;
            border: 1px solid rgba(147, 51, 234, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        h1 { color: #fff; text-align: center; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #9333ea; margin-bottom: 30px; font-size: 14px; }
        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }
        .user-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #9333ea, #7c3aed); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; }
        .user-info h3 { color: white; margin-bottom: 5px; }
        .user-info p { color: #888; font-size: 13px; }
        .status-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 13px;
            color: #94a3b8;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #7c3aed); width: 0%; transition: width 0.3s ease; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-voltar { background: transparent; border: 1px solid #334155; margin-top: 12px; }
        .btn-voltar:hover { background: rgba(255, 255, 255, 0.05); transform: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-database"></i> Migração de Dados</h1>
        <p class="subtitle">Migre seus dados do Firebase para Supabase</p>

        <div id="userSection" style="display: none;">
            <div class="user-card">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div class="user-info">
                    <h3 id="userName">Carregando...</h3>
                    <p id="userEmail">usuario@email.com</p>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status-box" id="statusBox">
            <i class="fas fa-info-circle"></i> Aguardando login...
        </div>

        <button id="migrateBtn" style="display: none;">🚀 Migrar para Supabase</button>
        <button id="loginBtn">🔑 Fazer Login com Google (Supabase)</button>
        <button class="btn-voltar" onclick="window.location.href='login/index.html'">← Voltar para o Login</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://yqxtfnnjjpoitbmtcxjd.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_CnZEwvltWwOT0H2t0-HXqA_WO-zWL2n";
        
        let supabase = null;
        let currentUser = null;
        
        function initSupabase() {
            if (!supabase && typeof createClient !== 'undefined') {
                supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('[Migrate] Supabase inicializado');
            }
            return supabase;
        }
        
        function updateStatus(message, type = 'info') {
            const statusBox = document.getElementById('statusBox');
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            const color = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#94a3b8';
            statusBox.innerHTML += `<div style="color: ${color}; margin-top: 8px;">${icon} ${message}</div>`;
            statusBox.scrollTop = statusBox.scrollHeight;
        }
        
        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }
        
        async function login() {
            const supabase = initSupabase();
            if (!supabase) {
                updateStatus('❌ Supabase não inicializado!', 'error');
                return;
            }
            
            updateStatus('🔐 Solicitando login com Google...');
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.href }
                });
                if (error) throw error;
            } catch (error) {
                updateStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        async function verificarEstrutura() {
            if (!currentUser) return false;
            
            updateStatus(`📁 Verificando estrutura para: ${currentUser.id}`);
            
            try {
                // Verificar se perfil existe
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();
                
                if (profileError && profileError.code !== 'PGRST116') {
                    throw profileError;
                }
                
                if (!profile) {
                    updateStatus(`📝 Criando perfil...`, 'info');
                    await supabase.from('profiles').insert({
                        id: currentUser.id,
                        email: currentUser.email,
                        nome: currentUser.user_metadata?.full_name || currentUser.email.split('@')[0],
                        avatar_url: currentUser.user_metadata?.avatar_url || null
                    });
                    updateProgress(30);
                }
                
                // Verificar settings
                const { data: settings } = await supabase
                    .from('settings')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (!settings) {
                    updateStatus(`📝 Criando configurações padrão...`, 'info');
                    await supabase.from('settings').insert({
                        user_id: currentUser.id,
                        notifications: { push: true, email: false, aulas: true, tarefas: true },
                        appearance: { theme: 'dark', accent: '#8b5cf6', fontSize: 14 }
                    });
                    updateProgress(60);
                }
                
                // Verificar weekly_schedule
                const { data: schedule } = await supabase
                    .from('weekly_schedule')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (!schedule) {
                    updateStatus(`📝 Criando horário semanal padrão...`, 'info');
                    await supabase.from('weekly_schedule').insert({
                        user_id: currentUser.id,
                        schedule: { Seg: [], Ter: [], Qua: [], Qui: [], Sex: [] }
                    });
                    updateProgress(90);
                }
                
                // Verificar time_slots
                const { data: slots } = await supabase
                    .from('time_slots')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();
                
                if (!slots) {
                    await supabase.from('time_slots').insert({
                        user_id: currentUser.id,
                        slots: ['08:00', '09:30', '11:00', '14:00', '15:30']
                    });
                }
                
                updateProgress(100);
                updateStatus('✅ Estrutura verificada e criada com sucesso!', 'success');
                return true;
                
            } catch (error) {
                updateStatus(`❌ Erro: ${error.message}`, 'error');
                return false;
            }
        }
        
        async function startMigration() {
            const btn = document.getElementById('migrateBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            updateStatus('🚀 INICIANDO VERIFICAÇÃO...', 'success');
            
            const success = await verificarEstrutura();
            
            if (success) {
                updateStatus('🎉 PROCESSO CONCLUÍDO!', 'success');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Dados Prontos!';
                btn.style.background = '#10b981';
                
                setTimeout(() => {
                    if (confirm('✅ Dados verificados! Deseja ir para o painel inicial?')) {
                        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
                        window.location.href = isMobile ? 'mobile-telas/index.html' : 'inicio/index.html';
                    }
                }, 1000);
            } else {
                updateStatus('❌ Falha na verificação. Tente novamente.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Tentar Novamente';
            }
        }
        
        // Verificar sessão existente
        async function checkSession() {
            const supabase = initSupabase();
            if (!supabase) return;
            
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                updateStatus(`✅ Usuário logado: ${currentUser.email}`, 'success');
                document.getElementById('userSection').style.display = 'block';
                document.getElementById('userName').textContent = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('userAvatar').textContent = (currentUser.user_metadata?.full_name?.charAt(0) || currentUser.email.charAt(0)).toUpperCase();
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('migrateBtn').style.display = 'block';
            }
        }
        
        // Event listeners
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('migrateBtn').onclick = startMigration;
        
        initSupabase();
        checkSession();
        
        // Monitorar mudanças de auth
        if (supabase) {
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    currentUser = session.user;
                    updateStatus(`✅ Login detectado: ${currentUser.email}`, 'success');
                    document.getElementById('userSection').style.display = 'block';
                    document.getElementById('userName').textContent = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
                    document.getElementById('userEmail').textContent = currentUser.email;
                    document.getElementById('userAvatar').textContent = (currentUser.user_metadata?.full_name?.charAt(0) || currentUser.email.charAt(0)).toUpperCase();
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('migrateBtn').style.display = 'block';
                }
            });
        }
        
        console.log('%c🔄 Página de Migração para Supabase', 'color: #9333ea; font-size: 16px; font-weight: bold;');
    </script>
</body>
</html>
