<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migração de Dados - Painel Zero</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px;
            border: 1px solid rgba(147, 51, 234, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        h1 { color: #fff; text-align: center; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #9333ea; margin-bottom: 30px; font-size: 14px; }
        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }
        .user-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #9333ea, #7c3aed); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; }
        .user-info h3 { color: white; margin-bottom: 5px; }
        .user-info p { color: #888; font-size: 13px; }
        .status-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 13px;
            color: #94a3b8;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #7c3aed); width: 0%; transition: width 0.3s ease; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-voltar { background: transparent; border: 1px solid #334155; margin-top: 12px; }
        .btn-voltar:hover { background: rgba(255, 255, 255, 0.05); transform: none; }
        .success-text { color: #10b981; }
        .error-text { color: #ef4444; }
        .warning-text { color: #f59e0b; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-database"></i> Migração de Dados</h1>
        <p class="subtitle">Recupere seus dados do sistema antigo</p>

        <div id="userSection" style="display: none;">
            <div class="user-card">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div class="user-info">
                    <h3 id="userName">Carregando...</h3>
                    <p id="userEmail">usuario@email.com</p>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status-box" id="statusBox">
            <i class="fas fa-info-circle"></i> Aguardando login...
        </div>

        <button id="migrateBtn" style="display: none;">🚀 Iniciar Migração</button>
        <button id="loginBtn">🔑 Fazer Login com Google</button>
        <button class="btn-voltar" onclick="window.location.href='login/index.html'">← Voltar para o Login</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Configuração Firebase (APENAS FIRESTORE, sem Realtime Database)
        const firebaseConfig = {
            apiKey: "AIzaSyDOXYoICsqe3D7bBALLI1MFLSGr1D-t4iY",
            authDomain: "zero-5e74d.firebaseapp.com",
            projectId: "zero-5e74d",
            storageBucket: "zero-5e74d.firebasestorage.app",
            messagingSenderId: "431244473899",
            appId: "1:431244473899:web:da9424fd226f7386dddc6e"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const firestore = firebase.firestore();
        const auth = firebase.auth();
        
        let currentUser = null;
        
        function updateStatus(message, type = 'info') {
            const statusBox = document.getElementById('statusBox');
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            const color = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#94a3b8';
            statusBox.innerHTML += `<div style="color: ${color}; margin-top: 8px;">${icon} ${message}</div>`;
            statusBox.scrollTop = statusBox.scrollHeight;
        }
        
        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }
        
        async function login() {
            updateStatus('🔐 Solicitando login com Google...');
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                currentUser = result.user;
                updateStatus(`✅ Logado como: ${currentUser.email}`, 'success');
                
                document.getElementById('userSection').style.display = 'block';
                document.getElementById('userName').textContent = currentUser.displayName || currentUser.email.split('@')[0];
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('userAvatar').textContent = currentUser.displayName?.charAt(0).toUpperCase() || '👤';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('migrateBtn').style.display = 'block';
                
                // Verificar se o usuário já existe no Firestore
                const userDoc = await firestore.collection('users').doc(currentUser.uid).get();
                if (userDoc.exists) {
                    updateStatus(`ℹ️ Usuário já possui dados no Firestore!`, 'warning');
                } else {
                    updateStatus(`ℹ️ Usuário novo. Dados serão criados.`, 'info');
                }
                
            } catch (error) {
                updateStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        async function criarDadosPadraoNoFirestore() {
            if (!currentUser) return false;
            const userId = currentUser.uid;
            
            updateStatus(`📁 Criando estrutura de dados para: ${userId}`);
            
            try {
                const userRef = firestore.collection('users').doc(userId);
                
                // Criar perfil do usuário
                await userRef.set({
                    email: currentUser.email,
                    nome: currentUser.displayName || currentUser.email.split('@')[0],
                    profilePhotoUrl: currentUser.photoURL || null,
                    createdAt: new Date().toISOString()
                });
                updateStatus(`✅ Perfil criado`, 'success');
                updateProgress(20);
                
                // Criar coleções vazias
                await userRef.collection('tasks').doc('_placeholder').set({ placeholder: true });
                await userRef.collection('notes').doc('_placeholder').set({ placeholder: true });
                await userRef.collection('calendarEvents').doc('_placeholder').set({ placeholder: true });
                await userRef.collection('settings').doc('weeklySchedule').set({ Seg: [], Ter: [], Qua: [], Qui: [], Sex: [] });
                await userRef.collection('settings').doc('timeSlots').set({ slots: ['08:00', '09:30', '11:00', '14:00', '15:30'] });
                await userRef.collection('settings').doc('preferences').set({
                    notifications: { push: true, email: false, aulas: true, tarefas: true },
                    appearance: { theme: 'dark', accent: '#8b5cf6', fontSize: 14 }
                });
                
                // Remover placeholders
                await userRef.collection('tasks').doc('_placeholder').delete();
                await userRef.collection('notes').doc('_placeholder').delete();
                await userRef.collection('calendarEvents').doc('_placeholder').delete();
                
                updateStatus(`✅ Estrutura de dados criada!`, 'success');
                updateProgress(100);
                
                return true;
                
            } catch (error) {
                updateStatus(`❌ Erro ao criar dados: ${error.message}`, 'error');
                return false;
            }
        }
        
        async function verificarMigracao() {
            if (!currentUser) return false;
            const userId = currentUser.uid;
            
            updateStatus(`📁 Verificando dados do usuário: ${userId}`);
            
            try {
                const userRef = firestore.collection('users').doc(userId);
                const userDoc = await userRef.get();
                
                if (!userDoc.exists) {
                    updateStatus(`⚠️ Nenhum dado encontrado. Criando estrutura nova...`, 'warning');
                    return await criarDadosPadraoNoFirestore();
                }
                
                // Verificar se tem dados nas coleções
                const tasksSnapshot = await userRef.collection('tasks').limit(1).get();
                const notesSnapshot = await userRef.collection('notes').limit(1).get();
                
                if (tasksSnapshot.empty && notesSnapshot.empty) {
                    updateStatus(`⚠️ Dados vazios. Criando estrutura padrão...`, 'warning');
                    return await criarDadosPadraoNoFirestore();
                }
                
                updateStatus(`✅ Dados já existem no Firestore!`, 'success');
                updateProgress(100);
                return true;
                
            } catch (error) {
                updateStatus(`❌ Erro: ${error.message}`, 'error');
                return false;
            }
        }
        
        async function startMigration() {
            const btn = document.getElementById('migrateBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando dados...';
            updateStatus('🚀 INICIANDO VERIFICAÇÃO...', 'success');
            
            const success = await verificarMigracao();
            
            if (success) {
                updateStatus('🎉 PROCESSO CONCLUÍDO COM SUCESSO!', 'success');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Dados Prontos!';
                btn.style.background = '#10b981';
                
                setTimeout(() => {
                    if (confirm('✅ Dados verificados! Deseja ir para o painel inicial?')) {
                        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;
                        window.location.href = isMobile ? 'mobile-telas/index.html' : 'inicio/index.html';
                    }
                }, 1000);
            } else {
                updateStatus('❌ Falha na verificação. Tente novamente.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Tentar Novamente';
                btn.style.background = 'linear-gradient(135deg, #8b5cf6, #7c3aed)';
            }
        }
        
        // Event listeners
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('migrateBtn').onclick = startMigration;
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                updateStatus(`✅ Usuário já logado: ${user.email}`, 'success');
                document.getElementById('userSection').style.display = 'block';
                document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').textContent = user.displayName?.charAt(0).toUpperCase() || '👤';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('migrateBtn').style.display = 'block';
            }
        });
        
        console.log('%c🔄 Página de Migração (Firestore apenas)', 'color: #9333ea; font-size: 16px; font-weight: bold;');
    </script>
</body>
</html>
