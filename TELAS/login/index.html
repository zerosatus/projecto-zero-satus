<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Zero - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
  <div class="logo-section">
    <div class="logo">
        <img src="https://i.postimg.cc/9M8BJgz0/IMG-20260228-230522-803-edit-630502892199888.jpg" alt="Painel Zero Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;">
    </div>
    <h1>Painel Zero</h1>
    <p class="subtitle">PLATAFORMA ACADÊMICA</p>
</div>

        <div class="login-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">LOGIN</button>
                <button class="tab-btn" data-tab="registro">REGISTRO</button>
            </div>

            <!-- Formulário de Login -->
            <form class="form active" id="login-form">
                <div class="input-group">
                    <label for="login-email">ENDEREÇO DE E-MAIL</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="login-email" placeholder="meuemail@gmail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-password">SENHA</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('login-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <a href="#" class="forgot-password" id="forgot-password">ESQUECI A SENHA</a>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">
                    ENTRAR
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Formulário de Registro -->
            <form class="form" id="registro-form">
                <div class="input-group">
                    <label for="registro-nome">NOME COMPLETO</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="registro-nome" placeholder="Seu nome" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="registro-email">ENDEREÇO DE E-MAIL</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="registro-email" placeholder="meuemail@gimail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="registro-password">SENHA</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="registro-password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('registro-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="registro-btn">
                    CRIAR CONTA
                    <i class="fas fa-user-plus"></i>
                </button>
            </form>

            <div class="divider">
                <span>OU CONTINUE COM</span>
            </div>

            <div class="social-login">
                <button class="btn-social" id="google-login">
                    <i class="fab fa-google"></i>
                    <span>GOOGLE</span>
                </button>
                <button class="btn-social" id="github-login">
                    <i class="fab fa-github"></i>
                    <span>GITHUB</span>
                </button>
            </div>

           <p class="register-link">
    ✨ Quer ver a demonstração de novo? <a href="index.html" id="toggle-registro" style="font-weight: bold; color: #00d4ff; text-decoration: underline;">Clique aqui para voltar</a>
</p>
        </div>
    </div>

    <!-- Toast para mensagens -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
