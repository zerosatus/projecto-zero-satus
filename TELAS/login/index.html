<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login e Cadastro</title>
    <link rel="icon" href="/imagem/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="logo-section">
        <div class="logo">
             <img src="../../imagem/logo1.png" alt="Painel Zero Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;">
        </div>
        <h1 id="main-title">Zero Satus</h1>
        <p class="subtitle" id="main-subtitle">PLATAFORMA ACADÊMICA</p>
    </div>

    <div class="login-container">
        <button type="button" class="btn-google" id="google-login-btn">
            <i class="fab fa-google"></i>
            TO BIZZ EM ENTRAR COM GOOGLE
        </button>

        <div class="divider">
            <span>ou</span>
        </div>

        <!-- FORMULÁRIO COM CAMPOS FALSOS PARA AUTOCMPLETE -->
        <form id="auth-form" autocomplete="off">
            <!-- Campos falsos para enganar autocomplete do navegador -->
            <input type="text" style="display:none" aria-hidden="true" tabindex="-1">
            <input type="password" style="display:none" aria-hidden="true" tabindex="-1">
            <input type="email" style="display:none" aria-hidden="true" tabindex="-1">

            <!-- Campo oculto anti-autocomplete -->
            <div style="position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; overflow: hidden;">
                <input type="text" name="fakeusername" id="fakeusername" tabindex="-1" autocomplete="off">
                <input type="password" name="fakepassword" id="fakepassword" tabindex="-1" autocomplete="off">
            </div>

            <div id="nome-field" class="input-group" style="display: none;">
                <input type="text" id="nome" placeholder="Coisola teu nome completo"
                       autocomplete="off"
                       autocorrect="off"
                       autocapitalize="off"
                       spellcheck="false"
                       data-lpignore="true"
                       data-1p-ignore="true">
            </div>
            <div class="input-group">
                <input type="email" id="email"
                       autocomplete="off"
                       autocorrect="off"
                       autocapitalize="off"
                       spellcheck="false"
                       data-lpignore="true"
                       data-1p-ignore="true"
                       placeholder="bomba teu@email.com" required>
            </div>
            <div class="input-group">
                <input type="password" id="password"
                       autocomplete="new-password"
                       data-lpignore="true"
                       data-1p-ignore="true"
                       placeholder="bomba tua senha" required>
            </div>

            <!-- 🔥 CHECKBOX DE TERMOS DE USO -->
            <div class="input-group" style="margin-bottom: 16px;">
                <label style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer; color: #94a3b8; font-size: 13px;">
                    <input type="checkbox" id="aceitar-termos" style="
                        width: 18px;
                        height: 18px;
                        min-width: 18px;
                        margin-top: 2px;
                        accent-color: #9333ea;
                        cursor: pointer;
                        border-radius: 4px;
                        transition: all 0.2s ease;
                    ">
                    <span>
                        Li e concordo com os 
                        <a href="../../termos.html" target="_blank" style="color: #9333ea; text-decoration: underline; font-weight: 600;">
                            Termos de Uso e Condições
                        </a>
                        <span style="color: #ef4444; font-weight: 700;">*</span>
                    </span>
                </label>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">
                <i class="fas fa-sign-in-alt"></i> TO BIZZ EM ENTRAR COM EMAIL
            </button>
        </form>

        <div class="register-link">
            <a href="#" id="toggle-mode-link">Já tem conta? Coisola essa cena e entra</a>
        </div>

        <div class="info-text">
            <i class="fas fa-shield-alt"></i>
            Fica de boa, ninguém vai ver tua cena
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- CORRIGIR A ORDEM - MOVER O supabase-client.js PARA ANTES DO SCRIPT.JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SERVIÇOS - ORDEM CORRIGIDA -->
<script src="../mobile-telas/supabase-client.js"></script>     <!-- PRIMEIRO -->
<script src="../mobile-telas/database-service.js"></script> 
<script src="../mobile-telas/init-supabase.js"></script>   <!-- DEPOIS -->
<script src="../mobile-telas/realtime-sync.js"></script>
<script src="../mobile-telas/cache-manager.js"></script>
<script src="../mobile-telas/shared-data.js"></script>
<script src="../mobile-telas/sync-helper.js"></script>

<!-- FUNCIONALIDADES -->
<script src="../mobile-telas/daily-phrases.js"></script>
<script src="../mobile-telas/notes-sync.js"></script>

<!-- PÁGINA - POR ÚLTIMO -->
<script src="script.js"></script>
</body>
</html>
