<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login</title>
    <link rel="icon" href="../../imagem/favicon.png" type="image/png"> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <img src="../../imagem/icon.jpg" alt="Painel Zero Logo">
            </div>
            <h1>Painel Zero</h1>
            <p class="subtitle">PLATAFORMA ACADÊMICA</p>
        </div>

        <div class="login-container">
            <!-- Botão Google -->
            <button type="button" class="btn-google" id="google-login-btn">
                <i class="fab fa-google"></i>
                ENTRAR COM GOOGLE
            </button>

            <!-- Botão para Migrar Dados -->
            <button type="button" class="btn-migrar" id="migrar-dados-btn" onclick="window.location.href='../migrate-to-firestore.html'">
                <i class="fas fa-database"></i>
                RECUPERAR MEUS DADOS ANTIGOS
            </button>

            <div class="info-text">
                <i class="fas fa-shield-alt"></i>
                Login seguro e sincronização em nuvem
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase CDNs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDOXYoICsqe3D7bBALLI1MFLSGr1D-t4iY",
            authDomain: "zero-5e74d.firebaseapp.com",
            projectId: "zero-5e74d",
            storageBucket: "zero-5e74d.firebasestorage.app",
            messagingSenderId: "431244473899",
            appId: "1:431244473899:web:da9424fd226f7386dddc6e"
        };
        
        // Inicializar Firebase
        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();

        // Função para detectar mobile
        function ehCelular() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
                || window.innerWidth <= 768;
        }

        // Verificar se já está logado
        const usuarioSalvo = localStorage.getItem('usuarioLogado');
        const currentPath = window.location.pathname;
        
        if (usuarioSalvo && !currentPath.includes('/login/')) {
            const destino = ehCelular() ? '../mobile-telas/index.html' : '../inicio/index.html';
            window.location.href = destino;
        }

        const googleLoginBtn = document.getElementById('google-login-btn');

        function showMessage(message, isError = false) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#dc2626' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.dataset.originalHtml = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AGUARDE...';
                button.disabled = true;
            } else {
                button.innerHTML = button.dataset.originalHtml;
                button.disabled = false;
            }
        }

        async function criarDadosPadrao(usuario) {
            const userId = usuario.uid;
            const dadosPadrao = {
                tasks: [],
                notes: [],
                calendarEvents: [],
                weeklySchedule: { 'Seg': [], 'Ter': [], 'Qua': [], 'Qui': [], 'Sex': [] },
                timeSlots: ['08:00', '09:30', '11:00', '14:00', '15:30'],
                notifications: []
            };
            
            for (const [key, value] of Object.entries(dadosPadrao)) {
                localStorage.setItem(`${userId}_${key}`, JSON.stringify(value));
            }
        }

        async function processarLogin(user, isNewUser) {
            const usuario = {
                uid: user.uid,
                email: user.email,
                nome: user.displayName || user.email.split('@')[0],
                foto: user.photoURL || null,
                logado: true
            };
            
            localStorage.setItem('usuarioLogado', JSON.stringify(usuario));
            
            if (isNewUser) {
                await criarDadosPadrao(usuario);
            }
            
            showMessage(`Bem-vindo, ${usuario.nome}!`);
            
            setTimeout(() => {
                const destino = ehCelular() ? '../mobile-telas/index.html' : '../inicio/index.html';
                window.location.href = destino;
            }, 500);
        }

        // Login com Google
        if (googleLoginBtn) {
            googleLoginBtn.addEventListener('click', async () => {
                try {
                    setLoading(googleLoginBtn, true);
                    const provider = new firebase.auth.GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    
                    const result = await auth.signInWithPopup(provider);
                    const isNewUser = result.additionalUserInfo?.isNewUser || false;
                    
                    await processarLogin(result.user, isNewUser);
                    
                } catch (error) {
                    console.error('Erro no login:', error);
                    let msg = 'Erro ao fazer login. ';
                    if (error.code === 'auth/popup-blocked') {
                        msg = 'Popup bloqueado! Permita popups.';
                    } else if (error.code === 'auth/network-request-failed') {
                        msg = 'Sem conexão com internet.';
                    } else {
                        msg += error.message;
                    }
                    showMessage(msg, true);
                    setLoading(googleLoginBtn, false);
                }
            });
        }

        // Monitorar estado de autenticação
        auth.onAuthStateChanged((user) => {
            if (user && !localStorage.getItem('usuarioLogado')) {
                processarLogin(user, false);
            }
        });

        console.log('✅ Painel Zero - Login pronto!');
    </script>
</body>
</html>
