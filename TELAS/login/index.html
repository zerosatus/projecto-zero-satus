<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login e Cadastro</title>
    <link rel="icon" href="/imagem/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">

            </div>
            <h1 id="main-title">Painel Zero</h1>
            <p class="subtitle" id="main-subtitle">PLATAFORMA ACADÊMICA</p>   
        </div>

        <div class="login-container">
            <button type="button" class="btn-google" id="google-login-btn">
                <i class="fab fa-google"></i>
                ENTRAR COM GOOGLE
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <form id="auth-form">
                <div id="nome-field" class="input-group" style="display: none;">
                    <input type="text" id="nome" placeholder="Seu nome completo" autocomplete="name">
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="submit-btn">
                    <i class="fas fa-sign-in-alt"></i> ENTRAR COM EMAIL
                </button>
            </form>

            <div class="register-link">
                <a href="#" id="toggle-mode-link">Não tem conta? Cadastre-se</a>
            </div>

            <div class="info-text">
                <i class="fas fa-shield-alt"></i>
                Login seguro e sincronização em nuvem
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SERVIÇOS (ORDEM IMPORTANTE!) -->
<script src="../supabase-client.js"></script>     <!-- AuthService primeiro -->
<script src="../database-service.js"></script>    <!-- DatabaseService -->
<script src="../realtime-sync.js"></script>       <!-- Realtime -->
<script src="../cache-manager.js"></script>       <!-- Cache -->
<script src="../shared-data.js"></script>         <!-- Shared -->
<script src="../sync-helper.js"></script>         <!-- Sync -->

<!-- FUNCIONALIDADES -->
<script src="../daily-phrases.js"></script>
<script src="../notes-sync.js"></script>

<!-- PÁGINA -->
<script src="script.js"></script>
</body>
</html>
