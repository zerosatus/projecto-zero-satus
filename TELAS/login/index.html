<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login</title>
    
    <link rel="icon" href="../../imagem/favicon.png" type="image/png"> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <img src="../../imagem/icon.jpg" alt="Painel Zero Logo">
            </div>
            <h1>Painel Zero</h1>
            <p class="subtitle">PLATAFORMA ACADÊMICA</p>
        </div>

        <div class="login-container">
            <button type="button" class="btn-google" id="google-login-btn">
                <i class="fab fa-google"></i>
                ENTRAR COM GOOGLE
            </button>

            <div class="info-text">
                <i class="fas fa-shield-alt"></i>
                Login seguro e sincronização em nuvem
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOXYoICsqe3D7bBALLI1MFLSGr1D-t4iY",
            authDomain: "zero-5e74d.firebaseapp.com",
            projectId: "zero-5e74d",
            storageBucket: "zero-5e74d.firebasestorage.app",
            messagingSenderId: "431244473899",
            appId: "1:431244473899:web:da9424fd226f7386dddc6e"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();

        function ehCelular() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
                || window.innerWidth <= 768;
        }

        const usuarioSalvo = localStorage.getItem('usuarioLogado');
        if (usuarioSalvo && !window.location.pathname.includes('/login/')) {
            window.location.href = ehCelular() ? '../mobile-telas/index.html' : '../inicio/index.html';
        }

        const googleLoginBtn = document.getElementById('google-login-btn');

        function showMessage(message, isError = false) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#dc2626' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.dataset.originalHtml = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AGUARDE...';
                button.disabled = true;
            } else {
                button.innerHTML = button.dataset.originalHtml;
                button.disabled = false;
            }
        }

        async function processarLogin(user) {
            const usuario = {
                uid: user.uid,
                email: user.email,
                nome: user.displayName || user.email.split('@')[0],
                foto: user.photoURL || null,
                logado: true
            };
            
            localStorage.setItem('usuarioLogado', JSON.stringify(usuario));
            
            showMessage(`Bem-vindo, ${usuario.nome}!`);
            
            setTimeout(() => {
                window.location.href = ehCelular() ? '../mobile-telas/index.html' : '../inicio/index.html';
            }, 500);
        }

        if (googleLoginBtn) {
            googleLoginBtn.addEventListener('click', async () => {
                try {
                    setLoading(googleLoginBtn, true);
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await auth.signInWithPopup(provider);
                    await processarLogin(result.user);
                } catch (error) {
                    let msg = 'Erro ao fazer login. ';
                    if (error.code === 'auth/popup-blocked') msg = 'Popup bloqueado! Permita popups.';
                    else msg += error.message;
                    showMessage(msg, true);
                    setLoading(googleLoginBtn, false);
                }
            });
        }
    </script>
</body>
</html>
