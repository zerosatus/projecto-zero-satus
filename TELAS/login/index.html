<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login e Cadastro</title>
    <link rel="icon" href="/imagem/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="logo-section">
        <div class="logo">
            <img src="https://i.postimg.cc/9M8BJgz0/IMG-20260228-230522-803-edit-630502892199888.jpg" alt="Zero" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">
        </div>
        <h1 id="main-title">Zero Satus</h1>
        <p class="subtitle" id="main-subtitle">PLATAFORMA ACADÊMICA</p>
    </div>

    <div class="login-container">
        <button type="button" class="btn-google" id="google-login-btn">
            <i class="fab fa-google"></i>
            ENTRAR COM GOOGLE
        </button>

        <div class="divider">
            <span>ou</span>
        </div>

        <!-- FORMULÁRIO COM CAMPOS FALSOS PARA AUTOCMPLETE -->
        <form id="auth-form" autocomplete="off">
            <!-- Campos falsos para enganar autocomplete do navegador -->
            <input type="text" style="display:none" aria-hidden="true" tabindex="-1">
            <input type="password" style="display:none" aria-hidden="true" tabindex="-1">
            <input type="email" style="display:none" aria-hidden="true" tabindex="-1">

            <!-- Campo oculto anti-autocomplete -->
            <div style="position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; overflow: hidden;">
                <input type="text" name="fakeusername" id="fakeusername" tabindex="-1" autocomplete="off">
                <input type="password" name="fakepassword" id="fakepassword" tabindex="-1" autocomplete="off">
            </div>

            <div id="nome-field" class="input-group" style="display: none;">
                <input type="text" id="nome" placeholder="Seu nome completo"
                       autocomplete="off"
                       autocorrect="off"
                       autocapitalize="off"
                       spellcheck="false"
                       data-lpignore="true"
                       data-1p-ignore="true">
            </div>
            <div class="input-group">
                <input type="email" id="email"
                       autocomplete="off"
                       autocorrect="off"
                       autocapitalize="off"
                       spellcheck="false"
                       data-lpignore="true"
                       data-1p-ignore="true"
                       placeholder="bomba teu@email.com" required>
            </div>
            <div class="input-group">
                <input type="password" id="password"
                       autocomplete="new-password"
                       data-lpignore="true"
                       data-1p-ignore="true"
                       placeholder="bomba tua senha" required>
            </div>
            <button type="submit" class="btn-primary" id="submit-btn">
                <i class="fas fa-sign-in-alt"></i> ENTRAR COM EMAIL
            </button>
        </form>

        <div class="register-link">
            <a href="#" id="toggle-mode-link">Não tem conta? Cria uma</a>
        </div>

        <div class="info-text">
            <i class="fas fa-shield-alt"></i>
            Login seguro e sincronização em nuvem
        </div>

        <!-- 🔥 BOTÃO DE SAIR DA CONTA ATUAL -->
        <div class="logout-section" style="margin-top: 20px; text-align: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <button onclick="forcarLogout()" style="
                background: none;
                border: none;
                color: #ef4444;
                cursor: pointer;
                font-size: 13px;
                padding: 8px 16px;
                border-radius: 8px;
                transition: all 0.3s;
                font-weight: 500;
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            "
                    onmouseover="this.style.background='rgba(239,68,68,0.1)'"
                    onmouseout="this.style.background='transparent'">
                <i class="fas fa-sign-out-alt"></i> Tô bizz em sair dessa conta
            </button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SERVIÇOS (ORDEM IMPORTANTE!) -->
<script src="../mobile-telas/supabase-client.js"></script>     <!-- AuthService primeiro -->
<script src="../mobile-telas/database-service.js"></script>    <!-- DatabaseService -->
<script src="../mobile-telas/realtime-sync.js"></script>       <!-- Realtime -->
<script src="../mobile-telas/cache-manager.js"></script>       <!-- Cache -->
<script src="../mobile-telas/shared-data.js"></script>         <!-- Shared -->
<script src="../mobile-telas/sync-helper.js"></script>         <!-- Sync -->

<!-- FUNCIONALIDADES -->
<script src="../mobile-telas/daily-phrases.js"></script>
<script src="../mobile-telas/notes-sync.js"></script>

<!-- PÁGINA -->
<script src="script.js"></script>
</body>
</html>
