<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login</title>
    <link rel="icon" href="../../imagem/favicon.png" type="image/png"> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <img src="../../imagem/icon.jpg" alt="Painel Zero Logo">
            </div>
            <h1>Painel Zero</h1>
            <p class="subtitle">PLATAFORMA ACADÊMICA</p>
        </div>

        <div class="login-container">
            <button type="button" class="btn-google" id="google-login-btn">
                <i class="fab fa-google"></i>
                ENTRAR COM GOOGLE
            </button>

            <button type="button" class="btn-migrar" onclick="window.location.href='../migrate-to-firestore.html'">
                <i class="fas fa-database"></i>
                RECUPERAR MEUS DADOS ANTIGOS
            </button>

            <div class="info-text">
                <i class="fas fa-shield-alt"></i>
                Login seguro e sincronização em nuvem
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- FIREBASE CDNs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- SISTEMA PRINCIPAL (ORDEM CORRETA) -->
    <script src="../preload-system.js"></script>
    <script src="../fast-bootstrap.js"></script>
    <script src="../cache-manager.js"></script>
    <script src="../shared-data.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../sync-helper.js"></script>
    <script src="../daily-phrases.js"></script>
    <script src="../notes-sync.js"></script>
    
    <!-- SCRIPT DO LOGIN -->
    <script src="script.js"></script>
</body>
</html>
