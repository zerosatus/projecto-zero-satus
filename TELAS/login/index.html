<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login</title>
    <link rel="icon" href="../../imagem/favicon.png" type="image/png"> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <img src="../../imagem/icon.jpg" alt="Painel Zero Logo">
            </div>
            <h1>Painel Zero</h1>
            <p class="subtitle">PLATAFORMA ACADÊMICA</p>
        </div>

        <div class="login-container">
            <button type="button" class="btn-google" id="google-login-btn">
                <i class="fab fa-google"></i>
                ENTRAR COM GOOGLE
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <form id="email-login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> ENTRAR COM EMAIL
                </button>
            </form>

            <div class="register-link">
                <a href="#" id="show-register">Não tem conta? Cadastre-se</a>
            </div>

            <div class="info-text">
                <i class="fas fa-shield-alt"></i>
                Login seguro e sincronização em nuvem
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- SUPABASE CDN + SCRIPT DO LOGIN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
