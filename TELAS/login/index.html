<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Painel Zero - Login</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%239333ea'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='50' fill='white' font-family='Arial'%3E🎓%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%239333ea'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='50' fill='white' font-family='Arial'%3E🎓%3C/text%3E%3C/svg%3E" alt="Painel Zero Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;">
            </div>
            <h1>Painel Zero</h1>
            <p class="subtitle">PLATAFORMA ACADÊMICA</p>
        </div>

        <div class="login-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">LOGIN</button>
                <button class="tab-btn" data-tab="registro">REGISTRO</button>
            </div>

            <form class="form active" id="login-form">
                <div class="input-group">
                    <label for="login-email">ENDEREÇO DE E-MAIL</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="login-email" placeholder="meuemail@gmail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-password">SENHA</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('login-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <a href="#" class="forgot-password" id="forgot-password">ESQUECI A SENHA</a>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">
                    ENTRAR
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <form class="form" id="registro-form">
                <div class="input-group">
                    <label for="registro-nome">NOME COMPLETO</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="registro-nome" placeholder="Seu nome" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="registro-email">ENDEREÇO DE E-MAIL</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="registro-email" placeholder="meuemail@gmail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="registro-password">SENHA</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="registro-password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('registro-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="registro-btn">
                    CRIAR CONTA
                    <i class="fas fa-user-plus"></i>
                </button>
            </form>

            <p class="register-link">
                Quer rever a animação? <a href="/index.html">Voltar ao início</a>
            </p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
    <script src="updates-popup.js"></script>
    <script src="../firebase-config.js"></script>
</body>
</html>
