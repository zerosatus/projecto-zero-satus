<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno - Anotações</title>
    <link rel="icon" href="../../imagem/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>Painel do Aluno</span>
            </div>
            
            <nav class="menu">
                <a href="../inicio/index.html" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Início</span>
                </a>
                <a href="../dashboard/index.html" class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="../calendario/index.html" class="menu-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Calendário</span>
                </a>
                <a href="../tarefas/index.html" class="menu-item">
                    <i class="fas fa-tasks"></i>
                    <span>Tarefas</span>
                </a>
                <a href="./index.html" class="menu-item active">
                    <i class="fas fa-sticky-note"></i>
                    <span>Anotações</span>
                </a>
            </nav>
            
            <div class="menu-bottom">
                <a href="#" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Comunidade</span>
                </a>
                <a href="#" class="menu-item">
                    <i class="fas fa-question-circle"></i>
                    <span>Ajuda</span>
                </a>
            </div>
            
            <div class="logout-section">
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="editor-container">
                <div class="toolbar">
                    <div class="toolbar-group">
                        <button class="toolbar-btn" onclick="formatText('bold')" title="Negrito"><i class="fas fa-bold"></i></button>
                        <button class="toolbar-btn" onclick="formatText('italic')" title="Itálico"><i class="fas fa-italic"></i></button>
                        <button class="toolbar-btn" onclick="formatText('underline')" title="Sublinhado"><i class="fas fa-underline"></i></button>
                        <button class="toolbar-btn" onclick="formatText('strikeThrough')" title="Riscado"><i class="fas fa-strikethrough"></i></button>
                    </div>
                    <div class="toolbar-group">
                        <button class="toolbar-btn" onclick="formatText('justifyLeft')" title="Esquerda"><i class="fas fa-align-left"></i></button>
                        <button class="toolbar-btn" onclick="formatText('justifyCenter')" title="Centro"><i class="fas fa-align-center"></i></button>
                        <button class="toolbar-btn" onclick="formatText('justifyRight')" title="Direita"><i class="fas fa-align-right"></i></button>
                    </div>
                    <div class="toolbar-group">
                        <button class="toolbar-btn" onclick="formatText('insertUnorderedList')" title="Lista"><i class="fas fa-list-ul"></i></button>
                        <button class="toolbar-btn" onclick="formatText('insertOrderedList')" title="Numérica"><i class="fas fa-list-ol"></i></button>
                    </div>
                    <div class="toolbar-group">
                        <select class="toolbar-select" onchange="formatText('formatBlock', this.value)">
                            <option value="p">Parágrafo</option>
                            <option value="h1">Título 1</option>
                            <option value="h2">Título 2</option>
                            <option value="h3">Título 3</option>
                        </select>
                    </div>
                    <div class="toolbar-spacer"></div>
                    <button class="btn-save" onclick="saveNote()"><i class="fas fa-save"></i><span>Salvar</span></button>
                </div>

                <div class="editor-wrapper">
                    <div class="editor-header">
                        <input type="text" class="note-title" placeholder="Título da anotação...">
                        <div class="note-meta"><span class="last-saved"></span></div>
                    </div>
                    <div class="editor-content" contenteditable="true" id="editor">
                        <p style="color: var(--text-secondary); text-align: center; padding: 40px;">✨ Nenhuma anotação selecionada<br>Clique em + para criar uma nova anotação</p>
                    </div>
                </div>
            </div>
        </main>

        <aside class="right-sidebar">
            <div class="sidebar-header">
                <h3>Minhas Anotações</h3>
                <button class="btn-new" onclick="createNewNote()"><i class="fas fa-plus"></i></button>
            </div>
            <div class="notes-list" id="notesList">
                <div style="text-align:center;padding:40px;color:var(--text-secondary)">
                    <i class="fas fa-sticky-note" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>
                    Nenhuma anotação<br>Clique em + para criar
                </div>
            </div>
            <div class="tags-section">
                <h3>Tags</h3>
                <div class="tags-list">
                    <span class="tag">Física</span>
                    <span class="tag">Matemática</span>
                    <span class="tag">Programação</span>
                    <span class="tag">Importante</span>
                </div>
            </div>
        </aside>
    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span>Anotação salva com sucesso!</span></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SERVIÇOS (ORDEM IMPORTANTE!) -->
<script src="../mobile-telas/supabase-client.js"></script>     <!-- AuthService primeiro -->
<script src="../mobile-telas/database-service.js"></script>    <!-- DatabaseService -->
<script src="../mobile-telas/realtime-sync.js"></script>       <!-- Realtime -->
<script src="../mobile-telas/cache-manager.js"></script>       <!-- Cache -->
<script src="../mobile-telas/shared-data.js"></script>         <!-- Shared -->
<script src="../mobile-telas/sync-helper.js"></script>         <!-- Sync -->

<!-- FUNCIONALIDADES -->
<script src="../mobile-telas/daily-phrases.js"></script>
<script src="../mobile-telas/notes-sync.js"></script>

<!-- PÁGINA -->
<script src="script.js"></script>
</body>
</html>
