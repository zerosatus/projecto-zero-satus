<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenho uma pergunta... ❤️</title>
    <style>
        body {
            background-color: #ffe4e1; /* Rosa bem clarinho */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            width: 85%;
            max-width: 320px;
            border: 3px solid #ff69b4;
            position: relative;
        }

        /* Ursinho Cor-de-Rosa */
        .ursinho {
            width: 150px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            color: #d81b60;
            margin-top: 0;
        }

        .botoes {
    display: flex;            /* Coloca os itens em linha */
    justify-content: center;   /* Centraliza eles */
    align-items: center;       /* Alinha na vertical */
    gap: 20px;                /* Cria o espaço entre o Sim e o Não */
    margin-top: 20px;
    position: relative;        /* Dá uma base para o botão fujão */
    height: 50px;
}

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        #btn-sim {
            background-color: #ff69b4;
            color: white;
        }

       #btn-nao {
    background-color: #b0b0b0;
    color: white;
    position: relative;        /* MUDANÇA AQUI: começa como relative para ficar no lugar */
    z-index: 999;
}

        /* Estilo da tela de sucesso */
        .sucesso-img {
            width: 180px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="painel">
        <img src="https://i.ibb.co/LdYZbkzH/images.jpg" alt="images" border="0"></a>
    
        <h1>Aceitas namorar comigo deusa grega?</h1>
        
        <div class="botoes">
            <button id="btn-sim" onclick="aceitou()">SIM!</button>
            <button id="btn-nao" onmouseover="fugir()" ontouchstart="fugir()">Não</button>
        </div>
    </div>

    <script>
        function fugir() {
            const btnNao = document.getElementById("btn-nao");
            
            // Calcula limites para o botão não sair da área visível
            const larguraMax = window.innerWidth - btnNao.offsetWidth - 20;
            const alturaMax = window.innerHeight - btnNao.offsetHeight - 20;

            const novaPosicaoX = Math.floor(Math.random() * larguraMax);
            const novaPosicaoY = Math.floor(Math.random() * alturaMax);

            btnNao.style.left = novaPosicaoX + "px";
            btnNao.style.top = novaPosicaoY + "px";
        }

        function aceitou() {
            const painel = document.getElementById("painel");
            // Muda o conteúdo quando clicar em SIM
            painel.innerHTML = `
               <img src="https://i.ibb.co/6RxgYhT7/IMG-20260117-WA0002.jpg" alt="IMG-20260117-WA0002" border="0"></a>
                <h1 style="color: #ff69b4; margin-top: 15px;">SABIA! ❤️<br>Prometo te fazer muito feliz!</h1>
            `;
            // Remove o botão fujão caso ele esteja em outro lugar da tela
            document.getElementById("btn-nao").style.display = "none";
        }
    </script>
</body>
</html>
